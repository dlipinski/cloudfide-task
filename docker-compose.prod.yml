# Production stack: frontend built to a static bundle and served by nginx.
# Run with: docker compose -f docker-compose.prod.yml up -d --build
services:
  frontend:
    build:
      context: .
      target: prod
      args:
        # Baked into the bundle at build time. The browser runs on the host, so
        # it reaches the backend via the host port, matching backend CORS_ORIGIN.
        VITE_API_URL: "http://localhost:5001"
    container_name: modular-form-creator-frontend
    ports:
      # nginx listens on 80; expose on host 5173 so backend CORS_ORIGIN matches.
      - "5173:80"
    depends_on:
      - backend
  backend:
    build: ./backend
    container_name: modular-form-creator-backend
    ports:
      - "5001:5001"
    environment:
      PORT: "5001"
      MONGO_URI: "mongodb://mongo:27017/modular_form_creator"
      CORS_ORIGIN: "http://localhost:5173"
    depends_on:
      - mongo
  mongo:
    image: mongo:7
    container_name: modular-form-creator-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
